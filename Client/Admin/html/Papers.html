<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Papers — Admin · UniLab</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style/app.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%234f46e5'/%3E%3Ctext x='16' y='23' font-size='20' font-family='Arial' font-weight='bold' fill='white' text-anchor='middle'%3ER%3C/text%3E%3C/svg%3E" />
</head>
<body class="bg-ink-100">
  <div class="flex min-h-screen">
    <aside id="admin-sidebar" class="hidden w-64 shrink-0 border-r border-ink-200 bg-white p-4 lg:block"></aside>
    <div id="admin-drawer" class="fixed inset-0 z-50 hidden lg:hidden">
      <div id="drawer-backdrop" class="absolute inset-0 bg-ink-900/40"></div>
      <aside id="admin-drawer-body" class="absolute left-0 top-0 h-full w-64 bg-white p-4 shadow-xl"></aside>
    </div>
    <div class="flex min-w-0 flex-1 flex-col">
      <header class="flex h-14 items-center gap-3 border-b border-ink-200 bg-white/80 backdrop-blur-md px-4 lg:hidden sticky top-0 z-40">
        <button id="drawer-open" class="grid h-9 w-9 place-items-center rounded-lg hover:bg-ink-100 text-ink-600 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg>
        </button>
        <span class="font-bold tracking-tight text-ink-900">Manage Papers</span>
      </header>
      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="mx-auto max-w-6xl">
          <h1 class="text-2xl font-black">Manage papers</h1>
          <p class="mt-1 text-ink-600">Upload new PYQ papers and manage existing ones.</p>

          <div class="mt-6 grid gap-6 lg:grid-cols-5">
            <!-- Upload form -->
            <div class="lg:col-span-2">
              <div class="card p-6">
                <h2 class="font-bold">Add paper</h2>
                <div id="upload-form-host" class="mt-4"></div>
              </div>
            </div>
            <!-- Table -->
            <div class="lg:col-span-3">
              <div class="card">
                <div class="flex items-center justify-between border-b border-ink-200 px-5 py-4">
                  <h2 class="font-bold">All papers</h2>
                  <span id="table-count" class="text-sm text-ink-500"></span>
                </div>
                <div id="table-host"></div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="/admin/script/papers.js"></script>
</body>
</html>
