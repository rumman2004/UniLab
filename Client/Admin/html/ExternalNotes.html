<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage External Notes — Admin · UniLab</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style/app.css" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
</head>
<body class="bg-ink-100">
  <div class="flex min-h-screen">
    <aside id="admin-sidebar" class="fixed inset-y-0 left-0 z-40 hidden w-64 flex-col border-r border-ink-200 bg-white transition-all duration-300 lg:flex"></aside>

    <!-- Mobile drawer -->
    <div id="admin-drawer" class="fixed inset-0 z-50 hidden lg:hidden opacity-0 pointer-events-none transition-opacity duration-300">
      <div id="drawer-backdrop" class="absolute inset-0 bg-ink-900/40"></div>
      <aside id="admin-drawer-body" class="absolute left-0 top-0 h-full w-64 bg-white shadow-xl -translate-x-full transition-transform duration-300"></aside>
    </div>

    <div class="flex min-w-0 flex-1 flex-col transition-all duration-300 lg:pl-64">
      <header class="flex h-16 items-center gap-3 border-b border-ink-200 bg-white px-4 lg:hidden sticky top-0 z-30 shadow-sm">
        <button id="drawer-open" class="grid h-10 w-10 place-items-center rounded-xl hover:bg-ink-100 text-ink-600 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg>
        </button>
        <span class="font-bold tracking-tight text-ink-900 text-lg">Manage External Notes</span>
      </header>
      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="mx-auto max-w-6xl">
          <h1 class="text-2xl font-black">Manage External Notes</h1>
          <p class="mt-1 text-ink-600">Upload and organize notes for subjects outside the standard BCA syllabus.</p>

          <div class="mt-6 flex flex-col gap-8">
            <!-- Upload form -->
            <div>
              <div class="card p-6 border-t-4 border-indigo-500">
                <h2 class="text-xl font-bold tracking-tight text-ink-900">Add external notes</h2>
                <div id="upload-form-host" class="mt-4"></div>
              </div>
            </div>
            <!-- Table -->
            <div>
              <div class="card p-0">
                <div class="flex items-center justify-between border-b border-ink-100 bg-ink-50/50 p-6">
                  <h2 class="text-xl font-bold tracking-tight text-ink-900">All external notes</h2>
                  <span id="table-count" class="rounded-full bg-white px-3 py-1 text-sm font-semibold text-ink-600 ring-1 ring-inset ring-ink-200"></span>
                </div>
                <div id="table-host"></div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="/admin/script/external-notes.js"></script>
</body>
</html>
