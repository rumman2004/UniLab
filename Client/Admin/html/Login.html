<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — UniLab</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style/app.css" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
</head>
<body class="relative flex min-h-screen items-center justify-center overflow-hidden bg-ink-50 px-4 selection:bg-brand-500/20 selection:text-brand-900">
  
  <div class="pointer-events-none absolute inset-0 z-0 flex items-center justify-center overflow-hidden">
    <div class="absolute inset-0 bg-[linear-gradient(to_right,#0f172a0a_1px,transparent_1px),linear-gradient(to_bottom,#0f172a0a_1px,transparent_1px)] bg-[size:24px_24px]"></div>
  </div>

  <div class="relative z-10 w-full max-w-[420px]">
    <!-- Brand / Logo -->
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center justify-center gap-3 group transition-transform hover:scale-105 active:scale-95">
        <div class="relative grid h-14 w-14 place-items-center overflow-hidden rounded-lg bg-brand-600 text-white shadow-lg shadow-brand-500/20">
          <div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
          <span class="text-2xl font-black font-heading tracking-tight">U</span>
        </div>
        <span class="text-4xl font-black font-heading tracking-tight text-ink-950">Uni<span class="text-brand-600">Lab</span></span>
      </a>
    </div>

    <!-- Login Card -->
    <div class="surface-panel p-6 transition-all sm:p-8">
      <div class="mb-8">
        <h1 class="text-2xl font-black font-heading tracking-tight text-ink-950">Welcome back</h1>
        <p class="mt-2 text-sm font-medium text-ink-500">Sign in to your admin workspace.</p>
      </div>
      
      <form id="login-form" class="space-y-5">
        <div class="space-y-1.5">
          <label class="block text-sm font-bold text-ink-900" for="username">Username</label>
          <input id="username" class="w-full rounded-lg border border-ink-200 bg-ink-50 px-4 py-3.5 text-base font-medium text-ink-900 transition-all placeholder:text-ink-300 focus:border-brand-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-brand-500/10" placeholder="admin" autocomplete="username" required />
        </div>
        
        <div class="space-y-1.5">
          <div class="flex items-center justify-between">
            <label class="block text-sm font-bold text-ink-900" for="password">Password</label>
          </div>
          <input id="password" type="password" class="w-full rounded-lg border border-ink-200 bg-ink-50 px-4 py-3.5 text-base font-medium text-ink-900 transition-all placeholder:text-ink-300 focus:border-brand-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-brand-500/10" placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <div id="login-error" class="hidden rounded-lg border border-red-200 bg-red-50 p-4 text-sm font-medium text-red-600 flex items-start gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5 shrink-0 mt-0.5"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-5a.75.75 0 01.75.75v4.5a.75.75 0 01-1.5 0v-4.5A.75.75 0 0110 5zm0 10a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd" /></svg>
          <span class="error-text"></span>
        </div>
        
        <button id="login-submit" class="group relative w-full overflow-hidden rounded-lg bg-brand-600 px-4 py-4 text-center text-sm font-bold text-white transition-all hover:bg-brand-700 hover:shadow-lg active:scale-[0.98]" type="submit">
          <span class="relative z-10 flex items-center justify-center gap-2">
            Sign in
            <svg class="w-4 h-4 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
          </span>
        </button>
      </form>
    </div>
    
    <div class="mt-8 text-center">
      <a href="/" class="inline-flex items-center justify-center gap-2 text-sm font-semibold text-ink-500 hover:text-ink-900 transition-colors group">
        <svg class="w-4 h-4 transition-transform group-hover:-translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Back to the public site
      </a>
    </div>
  </div>

  <script type="module" src="/admin/script/login.js"></script>
</body>
</html>
