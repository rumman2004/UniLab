<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact & Support — UniLab</title>
  <meta name="description" content="Request BCA study materials, report mistakes, or get in touch with the UniLab team." />
  <meta name="keywords" content="BCA support, UniLab contact, BCA material request" />
  <meta property="og:title" content="Contact & Support — UniLab" />
  <meta property="og:description" content="Request BCA study materials or report mistakes." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style/app.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%234f46e5'/%3E%3Ctext x='16' y='23' font-size='20' font-family='Arial' font-weight='bold' fill='white' text-anchor='middle'%3ER%3C/text%3E%3C/svg%3E" />
</head>
<body class="bg-ink-50 text-ink-900 font-sans antialiased selection:bg-brand-500 selection:text-white">
  <div id="site-nav"></div>

  <div class="pointer-events-none fixed inset-0 z-0 overflow-hidden">
    <div class="absolute top-1/4 left-1/4 h-[500px] w-[500px] rounded-full bg-emerald-400/20 blur-[100px] mix-blend-multiply"></div>
  </div>

  <main class="container-app relative z-10 py-16 lg:py-24">
    <div class="mx-auto grid max-w-6xl gap-16 lg:grid-cols-2 lg:items-center">
      
      <div>
        <span class="inline-flex items-center gap-2 rounded-full border border-emerald-200 bg-emerald-50 px-4 py-1.5 backdrop-blur-md shadow-sm mb-6">
          <span class="text-sm font-semibold tracking-wide text-emerald-700 uppercase">Support</span>
        </span>
        <h1 class="text-4xl font-black tracking-tight text-ink-900 sm:text-5xl lg:text-6xl">
          Need a paper <br/><span class="bg-gradient-to-r from-emerald-500 to-teal-500 bg-clip-text text-transparent">or note?</span>
        </h1>
        <p class="mt-6 text-lg text-ink-600 leading-relaxed max-w-lg">
          Can't find a subject, or spotted a mistake? Send us a request. Our community-driven library thrives on your feedback and contributions.
        </p>
        <div class="mt-10 space-y-6">
          <div class="flex items-center gap-4">
            <div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-white shadow-[0_4px_20px_-2px_rgba(15,23,42,0.05)] border border-ink-100/60 text-brand-500">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path d="M1.5 8.67v8.58a3 3 0 003 3h15a3 3 0 003-3V8.67l-8.928 5.493a3 3 0 01-3.144 0L1.5 8.67z" /><path d="M22.5 6.908V6.75a3 3 0 00-3-3h-15a3 3 0 00-3 3v.158l9.714 5.978a1.5 1.5 0 001.572 0L22.5 6.908z" /></svg>
            </div>
            <div>
              <p class="text-xs font-bold text-ink-400 uppercase tracking-widest">Contact</p>
              <a href="https://www.rumman-ahmed-portfolio.in/contact" target="_blank" class="text-lg font-bold text-brand-600 hover:text-brand-700 mt-0.5 break-all">rumman-ahmed-portfolio.in/contact</a>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-white shadow-[0_4px_20px_-2px_rgba(15,23,42,0.05)] border border-ink-100/60 text-emerald-500">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path fill-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zM12.75 6a.75.75 0 00-1.5 0v6c0 .414.336.75.75.75h4.5a.75.75 0 000-1.5h-3.75V6z" clip-rule="evenodd" /></svg>
            </div>
            <div>
              <p class="text-xs font-bold text-ink-400 uppercase tracking-widest">Response time</p>
              <p class="text-lg font-bold text-ink-900 mt-0.5">Usually within 1–2 days</p>
            </div>
          </div>
        </div>
      </div>

      <div class="rounded-[2rem] border border-white/50 bg-white/80 p-8 sm:p-10 backdrop-blur-xl shadow-2xl shadow-brand-900/10">
        <form id="support-form" class="space-y-6">
          <div>
            <label class="mb-2 block text-sm font-bold text-ink-900" for="s-name">Your name</label>
            <input id="s-name" class="w-full rounded-xl border border-ink-200 bg-ink-50 px-5 py-4 text-base transition-all focus:border-brand-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-brand-500/10" placeholder="e.g. Rahul" required />
          </div>
          <div>
            <label class="mb-2 block text-sm font-bold text-ink-900" for="s-email">Email address</label>
            <input id="s-email" type="email" class="w-full rounded-xl border border-ink-200 bg-ink-50 px-5 py-4 text-base transition-all focus:border-brand-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-brand-500/10" placeholder="you@example.com" required />
          </div>
          <div>
            <label class="mb-2 block text-sm font-bold text-ink-900" for="s-msg">What are you looking for?</label>
            <textarea id="s-msg" rows="4" class="w-full rounded-xl border border-ink-200 bg-ink-50 px-5 py-4 text-base transition-all focus:border-brand-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-brand-500/10 resize-none" placeholder="e.g. Sem 3 DBMS end-term paper 2023" required></textarea>
          </div>
          <button id="submit-btn" class="w-full rounded-xl bg-brand-600 px-6 py-4 text-lg font-bold text-white shadow-lg transition-all hover:bg-brand-700 hover:shadow-[0_0_20px_-5px_rgba(79,70,229,0.5)] hover:-translate-y-0.5 disabled:opacity-70 disabled:hover:-translate-y-0 disabled:hover:shadow-lg disabled:cursor-not-allowed" type="submit">
            Send request
          </button>
        </form>
      </div>

    </div>
  </main>
  
  <div id="site-footer"></div>
  
  <script type="module" src="/script/components.js"></script>
  <script type="module" src="/script/support.js"></script>
</body>
</html>
