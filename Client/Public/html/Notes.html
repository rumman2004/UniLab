<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BCA Subject Notes — Dibrugarh University | UniLab</title>
  <meta name="description" content="Download subject-wise notes for BCA Dibrugarh University, organized by semester and unit." />
  <meta name="keywords" content="BCA notes, BCA study material, Dibrugarh University BCA notes, BCA subject notes" />
  <meta property="og:title" content="BCA Subject Notes — Dibrugarh University" />
  <meta property="og:description" content="Download complete BCA subject notes." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style/app.css" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
</head>
<body class="bg-ink-50 text-ink-900 font-sans antialiased selection:bg-brand-500 selection:text-white">
  <div id="site-nav"></div>

  <div class="pointer-events-none fixed inset-0 z-0 overflow-hidden">
    <div class="absolute -top-40 left-0 h-[400px] w-[400px] rounded-full bg-amber-400/20 blur-[100px] mix-blend-multiply"></div>
  </div>

  <main class="container-app relative z-10 py-12 lg:py-20">
    <div class="mx-auto max-w-4xl text-center flex flex-col items-center gap-4">
      <span class="inline-flex items-center gap-2 rounded-full border border-amber-200 bg-amber-50 px-4 py-1.5 backdrop-blur-md shadow-sm">
        <span class="text-sm font-semibold tracking-wide text-amber-700 uppercase">Study Material</span>
      </span>
      <h1 class="text-4xl font-black tracking-tight text-ink-900 sm:text-5xl lg:text-6xl">
        Subject <span class="bg-gradient-to-r from-amber-500 to-orange-500 bg-clip-text text-transparent">Notes</span>
      </h1>
      <p class="max-w-2xl text-lg text-ink-600 leading-relaxed">Unit-wise notes to help you revise faster. Organized by subject and semester for Dibrugarh University BCA.</p>
    </div>

    <div class="mt-12 rounded-3xl border border-white/40 bg-white/60 p-6 backdrop-blur-xl shadow-xl shadow-brand-900/5 sm:p-8">
      <div class="grid gap-4 md:grid-cols-12">
        <div class="md:col-span-5">
          <label class="mb-1 block text-xs font-semibold text-ink-500 uppercase tracking-wide">Search</label>
          <input id="f-search" type="search" class="w-full rounded-xl border border-ink-200 bg-white px-4 py-3 text-sm transition-all focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/20" placeholder="🔍 Search by title…" />
        </div>
        <div class="md:col-span-3">
          <label class="mb-1 block text-xs font-semibold text-ink-500 uppercase tracking-wide">Subject</label>
          <select id="f-subject" class="w-full rounded-xl border border-ink-200 bg-white px-4 py-3 text-sm transition-all focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/20"><option value="">All subjects</option></select>
        </div>
        <div class="md:col-span-2">
          <label class="mb-1 block text-xs font-semibold text-ink-500 uppercase tracking-wide">Semester</label>
          <select id="f-semester" class="w-full rounded-xl border border-ink-200 bg-white px-4 py-3 text-sm transition-all focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/20"><option value="">All semesters</option></select>
        </div>
        <div class="md:col-span-2">
          <label class="mb-1 block text-xs font-semibold text-ink-500 uppercase tracking-wide">Sort By</label>
          <select id="f-sort" class="w-full rounded-xl border border-ink-200 bg-white px-4 py-3 text-sm transition-all focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/20">
            <option value="new">Newest</option>
            <option value="downloads">Most downloaded</option>
          </select>
        </div>
      </div>
      <div class="mt-6 flex items-center justify-between border-t border-ink-100 pt-4">
        <span id="result-count" class="text-sm font-medium text-ink-500"></span>
        <button id="f-clear" class="rounded-lg bg-ink-100 px-4 py-2 text-sm font-semibold text-ink-600 transition-colors hover:bg-ink-200 hover:text-ink-900">Clear filters</button>
      </div>
    </div>

    <div id="results" class="mt-8 grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"></div>
  </main>

  <div id="site-footer"></div>

  <script type="module" src="/script/components.js"></script>
  <script type="module" src="/script/notes.js"></script>
</body>
</html>
