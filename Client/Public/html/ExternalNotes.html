<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>External Notes — UniLab</title>
  <meta name="description" content="Download external notes for programming languages, networking, and other topics." />
  <meta name="keywords" content="BCA external notes, C, C++, Networking notes, Boolean Algebra" />
  <meta property="og:title" content="External Notes — UniLab" />
  <meta property="og:description" content="Download external notes for programming languages, networking, and other topics." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style/app.css" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
</head>
<body class="bg-ink-50 text-ink-900 font-sans antialiased selection:bg-brand-500 selection:text-white">
  <div id="site-nav"></div>

  <div class="pointer-events-none fixed inset-0 z-0 bg-[linear-gradient(to_bottom,#ffffff,#f8fafc)]"></div>

  <main class="container-app relative z-10 py-10 lg:py-16">
    <div class="mx-auto max-w-4xl text-center flex flex-col items-center gap-4">
      <span class="inline-flex items-center gap-2 rounded-full border border-emerald-200 bg-emerald-50 px-3 py-1 text-xs font-bold uppercase tracking-wide text-emerald-700">
        <span class="text-sm font-semibold tracking-wide text-emerald-700 uppercase">Extra Resources</span>
      </span>
      <h1 class="text-4xl font-black tracking-tight text-ink-900 sm:text-5xl">
        External <span class="text-emerald-600">Notes</span>
      </h1>
      <p class="max-w-2xl text-lg text-ink-600 leading-relaxed">Download notes for programming languages, networking, and other topics outside the standard syllabus.</p>
    </div>

    <!-- Filters Toggle (Mobile only) -->
    <div class="mt-10 flex items-center justify-end lg:hidden">
      <button id="toggle-filters" class="flex items-center gap-2 rounded-lg bg-white px-4 py-2.5 text-sm font-semibold text-ink-700 shadow-sm ring-1 ring-inset ring-ink-200 hover:bg-ink-50 transition-colors">
        <svg class="w-5 h-5 text-ink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3c2.755 0 5.455.232 8.083.678.533.09.917.556.917 1.096v1.044a2.25 2.25 0 01-.659 1.591l-5.432 5.432a2.25 2.25 0 00-.659 1.591v2.927a2.25 2.25 0 01-1.244 2.013L9.75 21v-6.568a2.25 2.25 0 00-.659-1.591L3.659 7.409A2.25 2.25 0 013 5.818V4.774c0-.54.384-1.006.917-1.096A48.32 48.32 0 0112 3z" /></svg>
        Search & Filters
      </button>
    </div>

    <!-- Filters -->
    <div id="filters-container" class="filter-panel">
      <div class="grid gap-3 lg:gap-4 md:grid-cols-12">
        <div class="md:col-span-5 min-w-0">
          <label class="filter-label">Search</label>
          <div class="relative group">
            <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 lg:pl-4 text-ink-400 group-focus-within:text-emerald-500 transition-colors">
              <svg class="w-4 h-4 lg:w-5 lg:h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
            </div>
            <input id="f-search" type="search" class="w-full min-w-0 max-w-full overflow-hidden text-ellipsis whitespace-nowrap rounded-xl border border-ink-200 bg-white/80 py-2 pl-9 pr-3 lg:py-2.5 lg:pl-11 lg:pr-4 text-xs lg:text-sm transition-all hover:bg-white hover:border-ink-300 focus:bg-white focus:border-emerald-500 focus:outline-none focus:ring-4 focus:ring-emerald-500/15 placeholder:text-ink-400" placeholder="Search by title…" />
          </div>
        </div>
        <div class="md:col-span-4 min-w-0">
          <label class="filter-label">Topic / Category</label>
          <div class="relative group">
            <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 lg:pl-4 text-ink-400 group-focus-within:text-emerald-500 transition-colors">
              <svg class="w-4 h-4 lg:w-5 lg:h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 8.25h15m-16.5 7.5h15m-1.8-13.5l-3.9 19.5m-2.1-19.5l-3.9 19.5" /></svg>
            </div>
            <select id="f-topic" class="appearance-none w-full min-w-0 max-w-full overflow-hidden text-ellipsis whitespace-nowrap rounded-xl border border-ink-200 bg-white/80 py-2 pl-9 pr-8 lg:py-2.5 lg:pl-11 lg:pr-10 text-xs lg:text-sm transition-all hover:bg-white hover:border-ink-300 focus:bg-white focus:border-emerald-500 focus:outline-none focus:ring-4 focus:ring-emerald-500/15 text-ink-900"><option value="">All topics</option></select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3 lg:pr-4 text-ink-400 group-focus-within:text-emerald-500 transition-colors">
              <svg class="w-3 h-3 lg:w-4 lg:h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
            </div>
          </div>
        </div>
        <div class="md:col-span-3 min-w-0">
          <label class="filter-label">Sort By</label>
          <div class="relative group">
            <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 lg:pl-4 text-ink-400 group-focus-within:text-emerald-500 transition-colors">
              <svg class="w-4 h-4 lg:w-5 lg:h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 4.5h14.25M3 9h9.75M3 13.5h9.75m4.5-4.5v12m0 0l-3.75-3.75M17.25 21L21 17.25" /></svg>
            </div>
            <select id="f-sort" class="appearance-none w-full min-w-0 max-w-full overflow-hidden text-ellipsis whitespace-nowrap rounded-xl border border-ink-200 bg-white/80 py-2 pl-9 pr-8 lg:py-2.5 lg:pl-11 lg:pr-10 text-xs lg:text-sm transition-all hover:bg-white hover:border-ink-300 focus:bg-white focus:border-emerald-500 focus:outline-none focus:ring-4 focus:ring-emerald-500/15 text-ink-900">
              <option value="new">Newest</option>
              <option value="downloads">Most downloaded</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3 lg:pr-4 text-ink-400 group-focus-within:text-emerald-500 transition-colors">
              <svg class="w-3 h-3 lg:w-4 lg:h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
            </div>
          </div>
        </div>
      </div>
      <div class="mt-6 flex items-center justify-between border-t border-ink-100 pt-4">
        <span id="result-count" class="text-sm font-medium text-ink-500"></span>
        <button id="f-clear" class="rounded-lg bg-ink-100 px-4 py-2 text-sm font-semibold text-ink-600 transition-colors hover:bg-ink-200 hover:text-ink-900">Clear filters</button>
      </div>
    </div>

    <div id="results" class="resource-grid"></div>
  </main>

  <div id="site-footer"></div>

  <script type="module" src="/script/components.js"></script>
  <script type="module" src="/script/external-notes.js"></script>
</body>
</html>
